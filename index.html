<title>IMM - OEE Entry Portal</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
  body { background: linear-gradient(135deg, #f0f4ff, #e8eeff); min-height: 100vh; padding: 20px; }
  .top-bar { height: 4px; background: linear-gradient(90deg, #4f46e5, #7c3aed); border-radius: 4px; margin-bottom: 20px; }
  .header, .card {
    background: #fff; border-radius: 14px; padding: 24px 32px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 20px;
  }

  /* ===== NEW HEADER LAYOUT ===== */
  .header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
  }
  .header-spacer { /* keeps title centered on left side */ }
  .header-title {
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .header h1 { font-size: 22px; color: #0f172a; letter-spacing: 1px; }
  .header .icon { font-size: 28px; }

  /* ===== MAIN PAGE BUTTON ===== */
  .main-page-btn {
    justify-self: end;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: #fff;
    text-decoration: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    transition: 0.2s;
    box-shadow: 0 4px 12px rgba(79,70,229,0.25);
    white-space: nowrap;
  }
  .main-page-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 18px rgba(79,70,229,0.4);
  }
  .main-page-btn .home-icon { font-size: 16px; }

  .section-title { font-size: 18px; color: #1e293b; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
  label { font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 6px; display: block; }
  input, select, textarea {
    width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
    font-size: 14px; outline: none; transition: 0.2s; background: #fff;
  }
  input:focus, select:focus, textarea:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.15); }
  .full { grid-column: 1 / -1; }
  textarea { resize: vertical; min-height: 70px; }
  button {
    margin-top: 20px; background: linear-gradient(135deg, #4f46e5, #6366f1);
    color: #fff; padding: 12px 28px; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s;
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(79,70,229,0.3); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .toast {
    position: fixed; top: 20px; right: 20px; padding: 14px 22px; border-radius: 8px;
    color: #fff; font-weight: 500; display: none; z-index: 1000;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  }
  .toast.success { background: #10b981; }
  .toast.error { background: #ef4444; }

  /* ===== MOBILE RESPONSIVE ===== */
  @media (max-width: 768px) {
    .header {
      grid-template-columns: 1fr;
      text-align: center;
    }
    .header-spacer { display: none; }
    .main-page-btn {
      justify-self: center;
      order: -1;
      margin-bottom: 10px;
    }
    .header h1 { font-size: 16px; }
    .header .icon { font-size: 22px; }
    .card { padding: 18px; }
  }
</style>

<script>
  // 🔗 Replace with your deployed Apps Script Web App URL
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyEJoo8_TY7aPc75w5DREDxBhQ7mO76d5hZwotBr1V91c_5ZUojxr8lp49i-kVqT9RMYQ/exec";

  const form = document.getElementById("entryForm");
  const toast = document.getElementById("toast");
  const btn = document.getElementById("submitBtn");

  function showToast(msg, type) {
    toast.textContent = msg;
    toast.className = "toast " + type;
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 3500);
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    btn.disabled = true; btn.textContent = "Submitting...";

    const data = Object.fromEntries(new FormData(form));

    try {
      const res = await fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify(data),
        headers: { "Content-Type": "text/plain;charset=utf-8" } // avoids CORS preflight
      });
      const result = await res.json();
      if (result.status === "success") {
        showToast("✅ Data added to row " + result.row, "success");
        form.reset();
      } else {
        showToast("❌ " + result.message, "error");
      }
    } catch (err) {
      showToast("❌ Network error: " + err.message, "error");
    } finally {
      btn.disabled = false; btn.textContent = "📤 Submit Production";
    }
  });
</script>
